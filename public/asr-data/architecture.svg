<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">asr-data 核心数据模型</title>
  <desc id="desc">从音频来源到 Audio、Waveform、Timeline、TimeSpan、Annotation 与 AudioDB 的关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#708090"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1b4055" flood-opacity=".12"/>
    </filter>
    <style>
      .title{font:700 42px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#16a6d7}
      .node{stroke-width:3;rx:14;filter:url(#shadow)}
      .cyan{fill:#d9f3fb;stroke:#28a9d3}.teal{fill:#dff7f2;stroke:#26b39c}
      .purple{fill:#eee7ff;stroke:#8169c7}.pink{fill:#ffe3ec;stroke:#e94b79}
      .yellow{fill:#fff3c9;stroke:#d8af1e}.gray{fill:#edf2f5;stroke:#8798a5}
      .label{font:700 27px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#263746;text-anchor:middle}
      .small{font:600 19px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#3c4d5a;text-anchor:middle}
      .tiny{font:600 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#52636e;text-anchor:middle}
      .edge{fill:none;stroke:#708090;stroke-width:3;marker-end:url(#arrow)}
      .tag{fill:#708090;rx:9}.tagtext{font:700 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:white;text-anchor:middle;letter-spacing:.4px}
    </style>
  </defs>

  <rect width="1600" height="1050" fill="#fff"/>
  <text class="title" x="75" y="78">asr-data</text>

  <!-- Sources -->
  <g>
    <rect class="node gray" x="250" y="45" width="145" height="70"/>
    <rect class="node gray" x="420" y="45" width="145" height="70"/>
    <rect class="node gray" x="590" y="45" width="145" height="70"/>
    <rect class="node gray" x="760" y="45" width="145" height="70"/>
    <rect class="node gray" x="930" y="45" width="145" height="70"/>
    <text class="small" x="322" y="88">Path</text><text class="small" x="492" y="88">URL</text>
    <text class="small" x="662" y="88">Bytes</text><text class="small" x="832" y="88">Base64</text>
    <text class="small" x="1002" y="88">PCM</text>
    <path class="edge" d="M322 115 V160 H665"/><path class="edge" d="M492 115 V150 H665"/>
    <path class="edge" d="M662 115 V150"/><path class="edge" d="M832 115 V150 H665"/>
    <path class="edge" d="M1002 115 V160 H665"/>
  </g>

  <rect class="node cyan" x="530" y="165" width="270" height="82"/>
  <text class="label" x="665" y="216">AudioSource</text>

  <!-- AudioInfo and Audio -->
  <rect class="node gray" x="225" y="300" width="230" height="82"/>
  <text class="label" x="340" y="350">AudioInfo</text>
  <rect class="tag" x="382" y="260" width="66" height="24"/><text class="tagtext" x="415" y="277">PROBE</text>
  <path class="edge" d="M555 247 L435 301"/>

  <rect class="node purple" x="545" y="300" width="300" height="100"/>
  <text class="label" x="695" y="346">Audio</text>
  <text class="tiny" x="695" y="376">id · info · metadata · source</text>
  <rect class="tag" x="658" y="260" width="76" height="24"/><text class="tagtext" x="696" y="277">OPEN / LOAD</text>
  <path class="edge" d="M695 247 V300"/>

  <!-- Runtime waveform and chunks -->
  <rect class="node cyan" x="1010" y="290" width="245" height="88"/>
  <text class="label" x="1132" y="344">Waveform</text>
  <rect class="tag" x="881" y="311" width="108" height="24"/><text class="tagtext" x="935" y="328">AS_WAVEFORM</text>
  <path class="edge" d="M845 334 H1010"/>

  <rect class="node teal" x="1010" y="430" width="245" height="88"/>
  <text class="label" x="1132" y="484">AudioChunk</text>
  <rect class="tag" x="900" y="440" width="88" height="24"/><text class="tagtext" x="944" y="457">STREAM</text>
  <path class="edge" d="M835 380 C900 410 935 455 1010 470"/>
  <text class="tiny" x="1132" y="545">offset_ms · end_ms · is_final</text>

  <!-- Timelines -->
  <rect class="node purple" x="545" y="485" width="300" height="88"/>
  <text class="label" x="695" y="539">Timeline</text>
  <rect class="tag" x="652" y="435" width="86" height="24"/><text class="tagtext" x="695" y="452">CONTAINS</text>
  <path class="edge" d="M695 400 V485"/>
  <text class="tiny" x="695" y="601">每个声道拥有一个时间轴</text>

  <rect class="node teal" x="350" y="650" width="260" height="82"/>
  <text class="label" x="480" y="700">ReferenceSpans</text>
  <text class="tiny" x="480" y="723">无 source</text>
  <rect class="node pink" x="760" y="650" width="260" height="82"/>
  <text class="label" x="890" y="700">PredictionSpans</text>
  <text class="tiny" x="890" y="723">source 必填</text>
  <path class="edge" d="M645 573 C610 610 555 625 500 650"/>
  <path class="edge" d="M745 573 C780 610 835 625 870 650"/>

  <rect class="node purple" x="550" y="785" width="290" height="88"/>
  <text class="label" x="695" y="840">TimeSpan</text>
  <text class="tiny" x="695" y="862">start_ms · end_ms · source</text>
  <path class="edge" d="M500 732 C540 755 595 770 635 785"/>
  <path class="edge" d="M870 732 C830 755 775 770 755 785"/>

  <rect class="node yellow" x="550" y="930" width="290" height="78"/>
  <text class="label" x="695" y="978">Annotation</text>
  <rect class="tag" x="645" y="889" width="100" height="24"/><text class="tagtext" x="695" y="906">ANNOTATION</text>
  <path class="edge" d="M695 873 V930"/>

  <rect class="node yellow" x="80" y="920" width="190" height="66"/><text class="small" x="175" y="960">AudioActivity</text>
  <rect class="node yellow" x="285" y="920" width="150" height="66"/><text class="small" x="360" y="960">Speaker</text>
  <rect class="node yellow" x="955" y="920" width="225" height="66"/><text class="small" x="1067" y="960">Transcription</text>
  <rect class="node yellow" x="1195" y="920" width="145" height="66"/><text class="small" x="1267" y="960">Token</text>
  <path class="edge" d="M550 969 H435"/><path class="edge" d="M550 969 H270"/>
  <path class="edge" d="M840 969 H955"/><path class="edge" d="M840 969 H1195"/>

  <!-- Persistence -->
  <rect class="node gray" x="1310" y="320" width="210" height="95"/>
  <text class="label" x="1415" y="365">AudioDB</text>
  <text class="tiny" x="1415" y="390">SQLite · waveform 不持久化</text>
  <rect class="tag" x="1277" y="268" width="84" height="24"/><text class="tagtext" x="1319" y="285">PERSISTS</text>
  <path class="edge" d="M845 315 C1050 220 1240 240 1330 320"/>

  <!-- Span waveform view -->
  <rect class="tag" x="875" y="770" width="108" height="24"/><text class="tagtext" x="929" y="787">AS_WAVEFORM</text>
  <path class="edge" d="M840 820 C1000 810 1100 690 1130 520"/>
</svg>
